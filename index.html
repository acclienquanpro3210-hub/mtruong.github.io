<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Minh Trường</title>

<style>

body{
margin:0;
font-family:monospace;
background:#0a0f1c;
color:white;
overflow-x:hidden;
}

/* STAR BACKGROUND */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

/* GRID */

.grid{
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
background-image:
linear-gradient(#1a2b4a 1px, transparent 1px),
linear-gradient(90deg,#1a2b4a 1px,transparent 1px);
background-size:40px 40px;
animation:moveGrid 20s linear infinite;
opacity:0.25;
z-index:-1;
}

@keyframes moveGrid{
0%{transform:translate(0,0)}
100%{transform:translate(-40px,-40px)}
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}

/* AVATAR */

.avatar{
width:140px;
border-radius:20px;
box-shadow:0 0 20px black;
}

/* JSON INFO */

.code{
background:#0f1729;
padding:20px;
border-radius:12px;
margin-top:20px;
text-align:left;
}

/* SKILLS */

.skills{
margin-top:40px;
text-align:left;
}

.skill{
margin:15px 0;
}

.bar{
background:#111;
border-radius:10px;
overflow:hidden;
}

.fill{
height:10px;
background:#00ff9d;
}

/* FOOTER */

footer{
margin-top:50px;
opacity:0.6;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<div class="grid"></div>

<div class="container">

<img class="avatar" src="avatar.jpg">

<h1>Minh Trường</h1>

<div class="code">
<pre>
{
"name": "Minh Trường",
"alias": "Mt",
"location": "Vietnam",
"birthday": "20/01/200*",
"interest": "Code bot",
"bio": "Xin chào, tôi là Minh Trường, tôi đam mê code python"
}
</pre>
</div>

<h2>Skills</h2>

<div class="skills">

<div class="skill">
Python
<div class="bar">
<div class="fill" style="width:90%"></div>
</div>
</div>

<div class="skill">
Bot Development
<div class="bar">
<div class="fill" style="width:85%"></div>
</div>
</div>

<div class="skill">
Discord Bot
<div class="bar">
<div class="fill" style="width:80%"></div>
</div>
</div>

</div>

<footer>
© Minh Trường
</footer>

</div>

<script>

const canvas = document.getElementById("stars")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let stars = []

for(let i=0;i<150;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
speed:Math.random()*2+0.5,
size:Math.random()*2
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

stars.forEach(star=>{

ctx.beginPath()
ctx.arc(star.x,star.y,star.size,0,Math.PI*2)
ctx.fill()

star.y += star.speed
star.x -= star.speed*0.2

if(star.y > canvas.height){
star.y = 0
star.x = Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
  </html>
